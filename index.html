<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>WebTrade CRM</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: #060d1a;
      color: #c5d0e8;
      font-family: "Courier New", monospace;
    }
    .app {
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .top {
      background: #0b1525;
      border-bottom: 1px solid #1a2840;
      padding: 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }
    .main {
      flex: 1;
      display: flex;
      min-height: 0;
    }
    .side {
      width: 220px;
      background: #050b16;
      border-right: 1px solid #1a2840;
      overflow: auto;
      flex-shrink: 0;
    }
    .right {
      width: 270px;
      background: #050b16;
      border-left: 1px solid #1a2840;
      overflow: auto;
      flex-shrink: 0;
    }
    .content {
      flex: 1;
      padding: 12px;
      min-width: 0;
      overflow: hidden;
    }
    .item {
      padding: 11px;
      border-bottom: 1px solid #0d1525;
      cursor: pointer;
      color: #5a6e8a;
    }
    .item:hover { background: #081827; }
    .item.active {
      background: #0c1e35;
      color: #63b3ed;
    }
    .panel {
      background: #08111e;
      border: 1px solid #1a2840;
      padding: 12px;
    }
    .btn {
      background: transparent;
      border: 1px solid #1a2840;
      color: #3d546e;
      padding: 7px 9px;
      cursor: pointer;
      margin: 2px;
      font-family: inherit;
    }
    .btn:hover { background: #0c1e35; }
    .green { border-color: #00d4a0; color: #00d4a0; }
    .red { border-color: #f05e5e; color: #f05e5e; }
    .blue { border-color: #63b3ed; color: #63b3ed; }
    .yellow { border-color: #f6ad55; color: #f6ad55; }
    .input {
      width: 100%;
      background: #0d1a2a;
      border: 1px solid #1a2840;
      color: #c5d0e8;
      padding: 8px;
      font-family: inherit;
    }
    .login {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at top, #0b1f35, #050b16 70%);
    }
    .metric {
      display: inline-block;
      text-align: center;
      margin: 0 8px;
    }
    .metric small {
      display: block;
      color: #5a6e8a;
    }
    .chartBox {
      height: 500px;
      background: #08111e;
      border: 1px solid #1a2840;
      padding: 10px;
      display: flex;
      flex-direction: column;
    }
    .chartHead {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 8px;
      gap: 10px;
    }
    .tfbar {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      margin-top: 7px;
    }
    .tfbtn {
      font-size: 11px;
      padding: 4px 7px;
      border: 1px solid #1a2840;
      background: #060d1a;
      color: #5a6e8a;
      cursor: pointer;
      font-family: inherit;
    }
    .tfbtn.active {
      border-color: #63b3ed;
      color: #63b3ed;
      background: #0c1e35;
    }
    .price {
      color: #63b3ed;
      font-size: 22px;
      font-weight: bold;
    }
    .chartWrap {
      flex: 1;
      min-height: 390px;
      background: #060d1a;
      border: 1px solid #0d1525;
      overflow: hidden;
    }
    #chartSvg {
      width: 100%;
      height: 100%;
      display: block;
    }
    .tabs {
      display: flex;
      background: #08111e;
      border: 1px solid #1a2840;
      border-top: 0;
    }
    .tab {
      padding: 8px 12px;
      border: 0;
      background: transparent;
      color: #5a6e8a;
      cursor: pointer;
      font-family: inherit;
    }
    .tab.active {
      color: #63b3ed;
      border-bottom: 2px solid #63b3ed;
    }
    .scroll {
      height: 155px;
      overflow: auto;
      background: #08111e;
      border: 1px solid #1a2840;
      border-top: 0;
    }
    .table {
      width: 100%;
      border-collapse: collapse;
    }
    .table td,
    .table th {
      border-bottom: 1px solid #0d1525;
      padding: 6px;
      font-size: 12px;
      text-align: left;
      white-space: nowrap;
    }
    .warn {
      background: #1f1606;
      border: 1px solid #f6ad55;
      color: #f6ad55;
      padding: 8px;
      margin: 8px 0;
      font-size: 11px;
      line-height: 1.55;
    }
    .error {
      background: #2a0d0d;
      border: 1px solid #f05e5e;
      color: #f05e5e;
      padding: 8px;
      margin: 8px 0;
    }
    .adminLayout {
      flex: 1;
      display: flex;
      min-height: 0;
    }
    .adminMenu {
      width: 250px;
      background: #050b16;
      border-right: 1px solid #1a2840;
      overflow: auto;
      flex-shrink: 0;
      padding: 8px;
    }
    .adminMenu button {
      width: 100%;
      display: block;
      text-align: left;
      background: transparent;
      border: 0;
      border-bottom: 1px solid #0d1525;
      color: #5a6e8a;
      padding: 12px 10px;
      cursor: pointer;
      font-family: inherit;
    }
    .adminMenu button:hover,
    .adminMenu button.active {
      background: #0c1e35;
      color: #63b3ed;
    }
    .adminContent {
      flex: 1;
      min-width: 0;
      overflow: auto;
      padding: 14px;
    }
    .adminGrid {
      display: grid;
      grid-template-columns: repeat(4, minmax(140px, 1fr));
      gap: 10px;
      margin-bottom: 12px;
    }
    .adminCard {
      background: #08111e;
      border: 1px solid #1a2840;
      padding: 12px;
    }
    .adminCard small {
      display: block;
      color: #5a6e8a;
      margin-bottom: 8px;
    }
    .adminCard b {
      color: #c5d0e8;
      font-size: 20px;
    }
    .status {
      border: 1px solid #1a2840;
      padding: 3px 6px;
      font-size: 11px;
      color: #63b3ed;
    }
    .adminTwoCol {
      display: grid;
      grid-template-columns: minmax(320px, 1.1fr) minmax(300px, 0.9fr);
      gap: 12px;
    }
    .formGrid {
      display: grid;
      grid-template-columns: repeat(2, minmax(120px, 1fr));
      gap: 10px;
    }
    .formGrid label {
      display: block;
      color: #5a6e8a;
      font-size: 12px;
      margin-bottom: 4px;
    }
    .detailList {
      display: grid;
      gap: 8px;
      margin-top: 10px;
    }
    .detailRow {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      border-bottom: 1px solid #0d1525;
      padding-bottom: 7px;
    }
    .detailRow span:first-child {
      color: #5a6e8a;
    }
    .miniActions {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin: 10px 0;
    }
    @media (max-width: 900px) {
      .main { display: block; overflow: auto; }
      .side, .right { width: 100%; max-height: 260px; }
      .adminLayout { display: block; }
      .adminMenu { width: 100%; max-height: 330px; }
      .adminGrid { grid-template-columns: repeat(2, minmax(120px, 1fr)); }
      .adminTwoCol,
      .formGrid { grid-template-columns: 1fr; }
      .app { height: auto; min-height: 100vh; }
      .top { flex-wrap: wrap; }
      .chartBox { height: 460px; }
      .chartWrap { min-height: 350px; }
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    const $ = (id) => document.getElementById(id);
    const app = $("app");

    let page = "login";
    let asset = "EUR/USD";
    let side = "BUY";
    let tab = "open";
    let tf = "M5";
    let adminSection = "Dashboard";
    let selectedClientId = "WT-1001";
    let selectedTradingAccountId = "MT5-50021";
    let loggedClientId = null;
    let currentAdminUser = null;
    let sessionTimer = null;
    let tickCount = 0;

    let balance = 1250;
    let positions = [];
    let closed = [];
    let money = [];
    let adminClients = [];
    let adminTradingAccounts = [];
    let adminDeposits = [];
    let adminWithdrawals = [];
    let adminPromotions = [];
    let adminAssetSettings = [];
    let adminRiskSettings = [];
    let adminSecurity = null;

    const ASSETS = [
      ["EUR/USD", 1.0854],
      ["GBP/USD", 1.2687],
      ["USD/JPY", 151.34],
      ["XAU/USD", 3042.15],
      ["XAG/USD", 27.55],
      ["BTC/USD", 84210],
      ["ETH/USD", 3120],
      ["US30", 38200],
      ["NAS100", 18200],
      ["AAPL", 185],
      ["TSLA", 210]
    ];

    const TIMEFRAMES = ["M1", "M5", "M15", "M30", "H1", "H4", "D1", "W1"];

    const ADVISORS = ["Sin asignar", "Laura Vega", "Mario Ruiz", "Sofia Nieto", "Diego Ramos"];
    const CLIENT_STATUSES = ["Activo", "Pendiente", "Bloqueado", "Suspendido"];
    const CRM_STAGES = ["Nuevo", "Contactado", "Registrado", "Demo", "FTD", "Activo", "Dorman"];
    const COMMERCIAL_TAGS = ["Alto valor", "Seguimiento urgente", "Interesado cripto", "Retención", "VIP", "KYC pendiente", "FTD pendiente"];
    const KYC_STATUSES = ["No iniciado", "Pendiente", "Verificado", "Rechazado"];
    const ACCESS_STATUSES = ["Habilitado", "Deshabilitado", "Bloqueado", "Pendiente activación"];
    const ACCOUNT_TYPES = ["Standard", "Pro", "VIP", "Demo"];
    const LEVERAGES = ["1:50", "1:100", "1:200", "1:500", "1:1000", "1:2000"];
    const DEPOSIT_STATUSES = ["Pendiente", "Confirmado", "Rechazado"];
    const WITHDRAWAL_STATUSES = ["En revisión", "Aprobado", "Pagado", "Rechazado"];
    const PROMO_TYPES = ["Crédito trading", "Bono"];
    const PROMO_STATUSES = ["Activo", "Quitado"];
    const WITHDRAWABLE_OPTIONS = ["Retirable", "No retirable"];
    const PAYMENT_METHODS = ["Transferencia bancaria", "Tarjeta", "SPEI", "Cripto", "Efectivo", "Otro"];
    const ADMIN_ROLES = ["Super admin", "Finanzas", "Retención", "Soporte", "Ventas"];
    const ROLE_PERMISSIONS = {
      "Super admin": ["Dashboard", "Solicitudes pendientes", "Clientes", "Cuentas trading", "Depósitos", "Retiros", "Créditos / Bonos", "Operaciones", "CRM", "Riesgo", "Reportes", "Configuración de activos", "Configuración", "Usuarios admin", "Auditoría"],
      Finanzas: ["Dashboard", "Solicitudes pendientes", "Depósitos", "Retiros", "Créditos / Bonos", "Reportes", "Auditoría"],
      Retención: ["Dashboard", "Solicitudes pendientes", "Clientes", "CRM", "Créditos / Bonos", "Reportes", "Auditoría"],
      Soporte: ["Dashboard", "Solicitudes pendientes", "Clientes", "Cuentas trading", "Operaciones", "CRM", "Auditoría"],
      Ventas: ["Dashboard", "Solicitudes pendientes", "Clientes", "CRM", "Reportes"]
    };
    const SENSITIVE_ACTIONS = ["Depósitos", "Retiros", "Créditos / Bonos", "Operaciones", "Riesgo", "Configuración de activos", "Usuarios admin"];
    const SESSION_MS = 15 * 60 * 1000;
    const SUPABASE_URL = "https://syvnewyeuyovxoyngick.supabase.co";
    const SUPABASE_KEY = "sb_publishable_3PylYN-hIJqnFIx8HQsj8A_3qr2q6Qs";
    const CLOUD_STATE_KEY = "main";

    let cloudReady = false;
    let cloudApplying = false;
    let cloudDirty = false;
    let cloudSaving = false;
    let cloudSaveTimer = null;
    let lastFloatingSaveAt = 0;

    const ADMIN_MENU = [
      "Dashboard",
      "Solicitudes pendientes",
      "Clientes",
      "Cuentas trading",
      "Depósitos",
      "Retiros",
      "Créditos / Bonos",
      "Operaciones",
      "CRM",
      "Riesgo",
      "Reportes",
      "Configuración de activos",
      "Configuración",
      "Usuarios admin",
      "Auditoría"
    ];

    const TICK_SPEED = {
      M1: 3,
      M5: 5,
      M15: 8,
      M30: 10,
      H1: 12,
      H4: 15,
      D1: 18,
      W1: 22
    };

    const VOLATILITY = {
      M1: 0.0006,
      M5: 0.001,
      M15: 0.0015,
      M30: 0.002,
      H1: 0.003,
      H4: 0.004,
      D1: 0.006,
      W1: 0.009
    };

    let prices = {};
    let candles = {};

    function chartKey(symbol = asset, timeframe = tf) {
      return symbol + "_" + timeframe;
    }

    function initMarket() {
      ASSETS.forEach((item) => {
        const symbol = item[0];
        const base = item[1];

        if (!prices[symbol]) prices[symbol] = base;

        TIMEFRAMES.forEach((timeframe) => {
          const key = chartKey(symbol, timeframe);
          if (!candles[key]) {
            let price = base;
            const arr = [];
            const vol = VOLATILITY[timeframe];

            for (let i = 0; i < 70; i++) {
              const open = price;
              const close = open + (Math.random() - 0.5) * base * vol;
              const high = Math.max(open, close) + Math.random() * base * vol * 0.4;
              const low = Math.min(open, close) - Math.random() * base * vol * 0.4;
              arr.push({ open, high, low, close });
              price = close;
            }

            candles[key] = arr;
          }
        });
      });
    }

    function price() {
      return prices[asset] || 1;
    }

    function fmt(value) {
      return Number(value || 0).toFixed(Number(value) > 100 ? 2 : 5);
    }

    function totalPnl() {
      updateFloatingPnl();
      return scopedPositions().reduce((sum, item) => sum + (item.pnl || 0), 0);
    }

    function usedMargin() {
      return scopedPositions().reduce((sum, item) => sum + (item.margin || 0), 0);
    }

    function moneyValue(value) {
      return Number(String(value || 0).replace(/[^0-9.-]/g, "")) || 0;
    }

    function moneyText(value) {
      return "$" + Number(value || 0).toFixed(2);
    }

    function loggedClient() {
      if (!adminClients.length) loadAdminClients();
      return adminClients.find((client) => client.id === loggedClientId) || null;
    }

    function accountBalance() {
      const client = loggedClient();
      const account = client ? currentTradingAccount() : null;
      return account ? Number(account.balance || 0) : client ? moneyValue(client.balance) : balance;
    }

    function updateLoggedClientBalance(nextBalance) {
      const client = loggedClient();
      if (!client) {
        balance = nextBalance;
        return;
      }

      const account = currentTradingAccount();
      if (account) {
        account.balance = Number(nextBalance.toFixed(2));
        account.equity = Number((nextBalance + totalPnl()).toFixed(2));
        account.freeMargin = Number(Math.max(0, account.equity - Number(account.usedMargin || 0)).toFixed(2));
        saveTradingAccounts();
      } else {
        client.balance = moneyText(nextBalance);
        saveAdminClients();
      }
    }

    function freeMargin() {
      return accountBalance() + totalPnl() - usedMargin();
    }

    function contractSize() {
      if (asset.includes("XAU")) return 100;
      if (asset.includes("XAG")) return 5000;
      if (asset.includes("/")) return 100000;
      return 1;
    }

    function contractSizeFor(symbol) {
      if (symbol.includes("XAU")) return 100;
      if (symbol.includes("XAG")) return 5000;
      if (symbol.includes("/")) return 100000;
      return 1;
    }

    function units(lots) {
      return Number(lots || 0) * contractSize();
    }

    function floatingPnl(position) {
      const current = prices[position.symbol] || position.open || 0;
      const direction = position.side === "SELL" ? -1 : 1;
      return (current - Number(position.open || 0)) * direction * Number(position.lots || 0) * contractSizeFor(position.symbol);
    }

    function updateFloatingPnl() {
      positions.forEach((position) => {
        if (position.status === "Pendiente") return;
        position.pnl = floatingPnl(position);
      });
    }

    function requiredMargin(lots, entryPrice) {
      return (units(lots) * Number(entryPrice || price())) / 2000;
    }

    function save() {
      localStorage.setItem(
        "webtrade_inline_v3",
        JSON.stringify({ balance, positions, closed, money, tf })
      );
      queueCloudSave();
    }

    function load() {
      try {
        const saved = JSON.parse(localStorage.getItem("webtrade_inline_v3"));
        if (saved) {
          balance = saved.balance || 1250;
          positions = saved.positions || [];
          closed = saved.closed || [];
          money = saved.money || [];
          tf = saved.tf || "M5";
        }
      } catch (error) {
        console.warn("No se pudo cargar estado local", error);
      }
    }

    function cloudHeaders(extra = {}) {
      return {
        apikey: SUPABASE_KEY,
        Authorization: "Bearer " + SUPABASE_KEY,
        "Content-Type": "application/json",
        ...extra
      };
    }

    function statePayload() {
      if (!adminClients.length) loadAdminClients();
      if (!adminTradingAccounts.length) loadTradingAccounts();
      if (!adminDeposits.length) loadDeposits();
      if (!adminWithdrawals.length) loadWithdrawals();
      if (!adminPromotions.length) loadPromotions();
      if (!adminAssetSettings.length) loadAssetSettings();
      if (!adminRiskSettings.length) loadRiskSettings();
      if (!adminSecurity) loadAdminSecurity();
      normalizeAllOperations();

      return {
        balance,
        positions,
        closed,
        money,
        tf,
        adminClients,
        adminTradingAccounts,
        adminDeposits,
        adminWithdrawals,
        adminPromotions,
        adminAssetSettings,
        adminRiskSettings,
        adminSecurity
      };
    }

    function applyCloudData(data) {
      if (!data || typeof data !== "object") return;
      cloudApplying = true;

      balance = Number(data.balance || balance || 1250);
      positions = Array.isArray(data.positions) ? data.positions : positions;
      closed = Array.isArray(data.closed) ? data.closed : closed;
      money = Array.isArray(data.money) ? data.money : money;
      tf = data.tf || tf;
      adminClients = Array.isArray(data.adminClients) ? data.adminClients : adminClients;
      adminClients.forEach(ensureClientPortalFields);
      adminTradingAccounts = Array.isArray(data.adminTradingAccounts) ? data.adminTradingAccounts : adminTradingAccounts;
      adminDeposits = Array.isArray(data.adminDeposits) ? data.adminDeposits : adminDeposits;
      adminWithdrawals = Array.isArray(data.adminWithdrawals) ? data.adminWithdrawals : adminWithdrawals;
      adminPromotions = Array.isArray(data.adminPromotions) ? data.adminPromotions : adminPromotions;
      adminAssetSettings = Array.isArray(data.adminAssetSettings) ? data.adminAssetSettings : adminAssetSettings;
      adminRiskSettings = Array.isArray(data.adminRiskSettings) ? data.adminRiskSettings : adminRiskSettings;
      adminSecurity = data.adminSecurity && typeof data.adminSecurity === "object" ? normalizeAdminSecurity(data.adminSecurity) : adminSecurity;
      normalizeAllOperations();

      localStorage.setItem("webtrade_inline_v3", JSON.stringify({ balance, positions, closed, money, tf }));
      localStorage.setItem("webtrade_admin_clients_v1", JSON.stringify(adminClients));
      localStorage.setItem("webtrade_admin_trading_accounts_v1", JSON.stringify(adminTradingAccounts));
      localStorage.setItem("webtrade_admin_deposits_v1", JSON.stringify(adminDeposits));
      localStorage.setItem("webtrade_admin_withdrawals_v1", JSON.stringify(adminWithdrawals));
      localStorage.setItem("webtrade_admin_promotions_v1", JSON.stringify(adminPromotions));
      localStorage.setItem("webtrade_admin_asset_settings_v1", JSON.stringify(adminAssetSettings));
      localStorage.setItem("webtrade_admin_risk_settings_v1", JSON.stringify(adminRiskSettings));
      localStorage.setItem("webtrade_admin_security_v1", JSON.stringify(adminSecurity));

      cloudApplying = false;
      cloudReady = true;
    }

    async function loadCloudState() {
      try {
        const response = await fetch(
          `${SUPABASE_URL}/rest/v1/app_state?key=eq.${encodeURIComponent(CLOUD_STATE_KEY)}&select=data`,
          { headers: cloudHeaders() }
        );
        if (!response.ok) throw new Error("Supabase load failed " + response.status);

        const rows = await response.json();
        if (rows && rows[0] && rows[0].data && Object.keys(rows[0].data).length) {
          applyCloudData(rows[0].data);
        } else {
          cloudReady = true;
          await saveCloudState();
        }
      } catch (error) {
        console.warn("No se pudo sincronizar con Supabase", error);
      }
    }

    async function saveCloudState() {
      if (cloudApplying) return true;
      if (cloudSaving) {
        cloudDirty = true;
        return true;
      }

      cloudSaving = true;
      cloudDirty = false;
      const payload = statePayload();
      try {
        const response = await fetch(`${SUPABASE_URL}/rest/v1/app_state?key=eq.${encodeURIComponent(CLOUD_STATE_KEY)}`, {
          method: "PATCH",
          headers: cloudHeaders({ Prefer: "return=minimal" }),
          body: JSON.stringify({ data: payload })
        });

        if (!response.ok) {
          const insertResponse = await fetch(`${SUPABASE_URL}/rest/v1/app_state`, {
            method: "POST",
            headers: cloudHeaders({ Prefer: "resolution=merge-duplicates,return=minimal" }),
            body: JSON.stringify({ key: CLOUD_STATE_KEY, data: payload })
          });
          if (!insertResponse.ok) throw new Error("Supabase insert failed " + insertResponse.status);
        }
        cloudSaving = false;
        if (cloudDirty) queueCloudSave(300);
        return true;
      } catch (error) {
        console.warn("No se pudo guardar en Supabase", error);
        cloudSaving = false;
        cloudDirty = true;
        queueCloudSave(5000);
        return false;
      }
    }

    function queueCloudSave(delay = 800) {
      if (cloudApplying) return;
      cloudDirty = true;
      if (cloudSaveTimer) clearTimeout(cloudSaveTimer);
      cloudSaveTimer = setTimeout(() => {
        saveCloudState();
      }, delay);
    }

    function saveBeforeExit() {
      if (cloudApplying) return;
      const payload = statePayload();
      fetch(`${SUPABASE_URL}/rest/v1/app_state?key=eq.${encodeURIComponent(CLOUD_STATE_KEY)}`, {
        method: "PATCH",
        headers: cloudHeaders({ Prefer: "return=minimal" }),
        body: JSON.stringify({ data: payload }),
        keepalive: true
      }).catch(() => {});
    }

    function defaultAdminSecurity() {
      return {
        twoFactorEnabled: true,
        twoFactorCode: "000000",
        maxFailedAttempts: 5,
        sensitiveConfirmation: true,
        users: [
          { username: "admin", password: "123456", role: "Super admin", status: "Activo", lastAccess: "Sin acceso", failedAttempts: 0, lockedUntil: null },
          { username: "finanzas", password: "123456", role: "Finanzas", status: "Activo", lastAccess: "Sin acceso", failedAttempts: 0, lockedUntil: null },

    function normalizeAdminSecurity(security) {
      const base = defaultAdminSecurity();
      return {
        ...base,
        ...security,
        users: Array.isArray(security.users) && security.users.length ? security.users.map((user) => ({
          username: user.username,
          password: user.password || "123456",

          status: user.status || "Activo",
          lastAccess: user.lastAccess || "Sin acceso",
          failedAttempts: Number(user.failedAttempts || 0),
          lockedUntil: user.lockedUntil || null
        })) : base.users,
        audit: Array.isArray(security.audit) ? security.audit : base.audit
      };
    }

      if (!adminSecurity) loadAdminSecurity();
      if (!confirmSensitive("Usuarios admin", "Modificar seguridad del administrador", "2FA, bloqueo y confirmación sensible")) return;
      adminSecurity.twoFactorEnabled = $("security2fa").checked;
      adminSecurity.twoFactorCode = $("security2faCode").value.trim() || "000000";

    function adminUser() {
      if (!adminSecurity) loadAdminSecurity();

    function canAccessModule(moduleName) {
      const user = adminUser();
      if (!user) return false;
      return (ROLE_PERMISSIONS[user.role] || []).includes(moduleName);
    }

    function registerAudit(moduleName, action, detail = "") {
      if (!adminSecurity) loadAdminSecurity();
      const user = adminUser();
      adminSecurity.audit = [
        {
          user: user?.username || currentAdminUser || "system",
          role: user?.role || "Sistema",
          module: moduleName,
          action,
          detail,
          at: new Date().toLocaleString()
        },
        ...(adminSecurity.audit || [])
      ].slice(0, 200);
      saveAdminSecurity();
    }

    function confirmSensitive(moduleName, action, detail = "") {
      if (!adminSecurity) loadAdminSecurity();
      if (!SENSITIVE_ACTIONS.includes(moduleName) || !adminSecurity.sensitiveConfirmation) {
        registerAudit(moduleName, action, detail);
        return true;
      }
      const ok = confirm(`Confirmación antes de movimiento sensible\n\nMódulo: ${moduleName}\nAcción: ${action}\nDetalle: ${detail || "-"}\n\n¿Confirmas la operación?`);
      registerAudit(moduleName, ok ? action : "Cancelado: " + action, detail);
      return ok;
    }

    function saveSession(targetPage, clientId = null) {
      const expiresAt = Date.now() + SESSION_MS;
      localStorage.setItem(
        "webtrade_session_v1",
        JSON.stringify({
          page: targetPage,
          loggedClientId: clientId,
          currentAdminUser,
          selectedTradingAccountId,
          expiresAt
        })
      );
      scheduleSessionTimeout(expiresAt);
    }

    function clearSession() {
      localStorage.removeItem("webtrade_session_v1");
      loggedClientId = null;
      currentAdminUser = null;
      if (sessionTimer) clearTimeout(sessionTimer);
      sessionTimer = null;
    }

    function scheduleSessionTimeout(expiresAt) {
      if (sessionTimer) clearTimeout(sessionTimer);
      const ms = Math.max(0, expiresAt - Date.now());
      sessionTimer = setTimeout(() => {
        clearSession();
        page = "login";
        render();
      }, ms);
    }

    function restoreSession() {
      try {
        const session = JSON.parse(localStorage.getItem("webtrade_session_v1"));
        if (!session || Date.now() > session.expiresAt) {
          clearSession();
          return;
        }

        page = session.page === "admin" ? "admin" : "trade";
        loggedClientId = session.loggedClientId || null;
        currentAdminUser = session.currentAdminUser || null;
        selectedTradingAccountId = session.selectedTradingAccountId || selectedTradingAccountId;
        scheduleSessionTimeout(session.expiresAt);
      } catch (error) {
        clearSession();
      }
    }

    async function login(requiredRole = null) {
      const user = $("u").value.trim().toLowerCase();
      const pass = $("p").value.trim();
      const otp = $("otp")?.value.trim() || "";
      if (!cloudReady) await loadCloudState();
      loadAdminClients();
      if (!adminSecurity) loadAdminSecurity();
      const adminAccount = adminSecurity.users.find((item) => item.username.toLowerCase() === user);
      const clientByUser = adminClients.find((client) =>
        String(client.accessUser || "").trim().toLowerCase() === user
      );
      const clientAccess = clientByUser && String(clientByUser.accessPass || "").trim() === pass
        ? clientByUser
        : null;

      if (requiredRole === "admin" && !adminAccount) {
        $("err").style.display = "block";
        $("err").textContent = "Login independiente: escribe un usuario administrador válido.";
        return;
      }

      if (requiredRole === "cliente" && !clientAccess && user !== "cliente") {
        $("err").style.display = "block";
        $("err").textContent = clientByUser ? "Contraseña de cliente incorrecta" : "Escribe un usuario de cliente válido";
        return;
      }

      if (adminAccount) {
        if (adminAccount.status !== "Activo") {
          $("err").style.display = "block";
          $("err").textContent = "Usuario administrador inactivo.";
          registerAudit("Seguridad del administrador", "Login bloqueado", user + " inactivo");
          return;
        }
        if (adminAccount.lockedUntil && Date.now() < Number(adminAccount.lockedUntil)) {
          $("err").style.display = "block";
          $("err").textContent = "Usuario bloqueado por intentos fallidos. Intenta más tarde.";
          registerAudit("Seguridad del administrador", "Login bloqueado", user + " bloqueado por intentos");
          return;
        }
        if (adminAccount.password !== pass) {
          adminAccount.failedAttempts = Number(adminAccount.failedAttempts || 0) + 1;
          if (adminAccount.failedAttempts >= adminSecurity.maxFailedAttempts) {
            adminAccount.lockedUntil = Date.now() + 15 * 60 * 1000;
          }
          saveAdminSecurity();
          registerAudit("Seguridad del administrador", "Intento fallido", user);
          $("err").style.display = "block";
          $("err").textContent = "Contraseña de administrador incorrecta.";
          return;
        }
        if (adminSecurity.twoFactorEnabled && otp !== adminSecurity.twoFactorCode) {
          adminAccount.failedAttempts = Number(adminAccount.failedAttempts || 0) + 1;
          saveAdminSecurity();
          registerAudit("Seguridad del administrador", "2FA fallido", user);
          $("err").style.display = "block";
          $("err").textContent = "Código de autenticación de dos pasos incorrecto.";
          return;
        }
        adminAccount.failedAttempts = 0;
        adminAccount.lockedUntil = null;
        adminAccount.lastAccess = new Date().toLocaleString();
        currentAdminUser = adminAccount.username;
        registerAudit("Seguridad del administrador", "Login admin", `${adminAccount.username} · ${adminAccount.role}`);
        saveAdminSecurity();
        page = "admin";
        adminSection = "Dashboard";
        saveSession("admin");
        render();
      } else if (clientAccess) {
        ensureClientPortalFields(clientAccess);
        if (clientAccess.emailVerified !== "Sí") {
          $("err").style.display = "block";
          $("err").textContent = "Verifica tu correo antes de iniciar sesión.";
          return;
        }
        if (clientAccess.clientTwoFactorEnabled === "Sí" && otp !== clientAccess.clientTwoFactorCode) {
          $("err").style.display = "block";
          $("err").textContent = "Código 2FA de cliente incorrecto.";
          return;
        }
        if (clientAccess.accessStatus !== "Habilitado" || clientAccess.portalAccess !== "Sí") {
          $("err").style.display = "block";
          $("err").textContent = "Acceso de cliente no habilitado. Revisa que esté Habilitado y con portal permitido.";
          return;
        }
        loggedClientId = clientAccess.id;
        selectedClientId = clientAccess.id;
        selectedTradingAccountId = defaultClientTradingAccount(clientAccess)?.id || "";
        page = "trade";
        saveSession("trade", clientAccess.id);
        render();
      } else if (user === "cliente" && pass === "123456") {
        loggedClientId = "WT-1001";
        selectedTradingAccountId = defaultClientTradingAccount(loggedClient())?.id || "";
        page = "trade";
        saveSession("trade", loggedClientId);
        render();
      } else {
        $("err").style.display = "block";
        $("err").textContent = "Usuario o contraseña incorrectos";
      }
    }

    function ensureTradingAccountPortalFields(account) {

    function currentTradingAccount() {
      if (!adminTradingAccounts.length) loadTradingAccounts();
      const client = loggedClient();

      if (client) {
        const accounts = clientTradingAccounts(client);
        const selected = accounts.find((account) => account.id === selectedTradingAccountId);
        const account = selected || defaultClientTradingAccount(client);
        selectedTradingAccountId = account?.id || "";
        return ensureTradingAccountPortalFields(account);
      }

      return ensureTradingAccountPortalFields(selectedTradingAccount());
    }

    function normalizeOperationOwnership(item) {
      if (!item) return item;
      if (!adminTradingAccounts.length) loadTradingAccounts();
      if (!adminClients.length) loadAdminClients();

      let account = item.accountId ? adminTradingAccounts.find((entry) => entry.id === item.accountId) : null;
      let client = item.clientId ? adminClients.find((entry) => entry.id === item.clientId) : null;

      if (!client && item.clientName) client = adminClients.find((entry) => entry.name === item.clientName);
      if (!client && account) client = adminClients.find((entry) => entry.name === account.client);
      if (!account && client) {
        account = adminTradingAccounts.find((entry) => entry.client === client.name && entry.active === "Activa")
          || adminTradingAccounts.find((entry) => entry.client === client.name);
      }
      if (!account && item.clientName) {
        account = adminTradingAccounts.find((entry) => entry.client === item.clientName && entry.active === "Activa")
          || adminTradingAccounts.find((entry) => entry.client === item.clientName);
      }

      if (account) item.accountId = account.id;
      if (client) item.clientId = client.id;
      if (account) item.clientName = account.client;
      return item;
    }

    function normalizeAllOperations() {
      positions.forEach(normalizeOperationOwnership);
      closed.forEach(normalizeOperationOwnership);
    }

    function positionBelongsToAccount(item, account = currentTradingAccount()) {
      if (!item || !account) return false;
      normalizeOperationOwnership(item);
      return item.accountId === account.id;
    }

    function scopedPositions() {
      if (page !== "trade") return positions;
      const account = currentTradingAccount();
      return positions.filter((item) => positionBelongsToAccount(item, account));
    }

    function scopedClosed() {
      if (page !== "trade") return closed;
      const account = currentTradingAccount();
      return closed.filter((item) => positionBelongsToAccount(item, account));
    }

    function accountForPosition(position) {
      if (!adminTradingAccounts.length) loadTradingAccounts();
      normalizeOperationOwnership(position);
      return adminTradingAccounts.find((account) => account.id === position.accountId) || null;
    }

    function applyClosedPnlToTradingAccount(position) {
      const account = accountForPosition(position);
      if (!account) return;

      const pnl = Number(position.pnl || 0);
      const releasedMargin = Number(position.margin || 0);
      const nextBalance = Number(account.balance || 0) + pnl;
      const nextUsedMargin = Math.max(0, Number(account.usedMargin || 0) - releasedMargin);
      const nextEquity = nextBalance;

      account.balance = Number(nextBalance.toFixed(2));
      account.equity = Number(nextEquity.toFixed(2));
      account.usedMargin = Number(nextUsedMargin.toFixed(2));
      account.freeMargin = Number(Math.max(0, nextEquity - nextUsedMargin).toFixed(2));
      account.lastUpdate = new Date().toLocaleString();
      saveTradingAccounts();
    }

    function marginPercent(account) {
      const used = Number(account?.usedMargin || 0);
      const equityValue = Number(account?.equity || 0);
      if (!used) return "Sin margen";
      return ((equityValue / used) * 100).toFixed(2) + "%";
    }

    function riskRows() {
      updateFloatingPnl();
      const settings = riskSettings();
      const rows = [];
      const byClient = {};
      positions.forEach((position) => {
        const client = operationClientName(position);
        if (!byClient[client]) byClient[client] = { positions: [], lots: 0, pnl: 0, symbols: {} };
        byClient[client].positions.push(position);
        byClient[client].lots += Number(position.lots || 0);
        byClient[client].pnl += Number(position.pnl || 0);
        byClient[client].symbols[position.symbol] = (byClient[client].symbols[position.symbol] || 0) + Number(position.lots || 0);
      });

      Object.keys(byClient).forEach((client) => {
        const risk = byClient[client];
        const account = adminTradingAccounts.find((item) => item.client === client) || {};
        const used = Number(account.usedMargin || risk.positions.reduce((sum, item) => sum + Number(item.margin || 0), 0));
        const equity = Number(account.equity || account.balance || 0) + risk.pnl;
        const marginLevel = used > 0 ? (equity / used) * 100 : 9999;
        const largestAsset = Object.entries(risk.symbols).sort((a, b) => b[1] - a[1])[0] || ["-", 0];
        const issues = [];
        if (marginLevel <= settings.marginAlert) issues.push("Alerta por margen bajo");
        if (risk.pnl <= -Math.abs(settings.highLossAlert)) issues.push("Alerta por pérdida alta");
        if (marginLevel <= settings.stopOutLevel) issues.push("Stop out automático");
        if (risk.lots >= settings.excessiveExposureLots) issues.push("Exposición excesiva");
        if (risk.pnl <= -Math.abs(settings.dailyLossLimit)) issues.push("Límite diario de pérdida");
        if (Math.max(...risk.positions.map((item) => Number(item.lots || 0))) >= settings.maxLotLimit) issues.push("Límite máximo de lote");
        if (largestAsset[1] >= settings.perAssetLimit) issues.push("Límite por activo");

        rows.push({
          client,
          accountId: account.id || "-",
          marginLevel,
          pnl: risk.pnl,
          lots: risk.lots,
          largestAsset: `${largestAsset[0]} ${largestAsset[1].toFixed(2)} lotes`,
          exposure: risk.positions.length,
          issues: issues.length ? issues.join(", ") : "Sin alertas",
          severity: marginLevel <= settings.stopOutLevel || risk.pnl <= -Math.abs(settings.dailyLossLimit) ? "Alta" : issues.length ? "Media" : "Baja"
        });
      });
      return rows;
    }

    function order() {
      const lotsEl = $("lots");
      const typeEl = $("otype");
      const entryEl = $("entry");
      const slEl = $("sl");
      const tpEl = $("tp");
      const errEl = $("oerr");

      const lots = Number(lotsEl.value);
      const entry = typeEl.value === "market" ? price() : Number(entryEl.value || price());
      const margin = requiredMargin(lots, entry);

      if (!lots || lots <= 0) {
        errEl.style.display = "block";
        errEl.textContent = "Volumen inválido";
        return;
      }

      if (freeMargin() < margin) {
        errEl.style.display = "block";
        errEl.textContent = "Saldo o margen insuficiente";
        return;
      }

      const tradingAccount = currentTradingAccount();
      const client = loggedClient();
      if (client && (!tradingAccount || tradingAccount.client !== client.name)) {
        errEl.style.display = "block";
        errEl.textContent = "No hay una cuenta trading válida para este cliente.";
        return;
      }
      if (tradingAccount && (tradingAccount.active !== "Activa" || tradingAccount.blockOpen === "Sí")) {
        errEl.style.display = "block";
        errEl.textContent = "La cuenta seleccionada no permite abrir operaciones.";
        return;
      }

      positions.unshift({
        id: Date.now(),
        accountId: tradingAccount?.id || null,
        clientId: client?.id || null,
        clientName: client?.name || tradingAccount?.client || "Sin cliente",
        symbol: asset,
        side,
        lots,
        orderType: typeEl.value === "market" ? "Mercado" : "Pendiente",
        status: typeEl.value === "market" ? "Abierta" : "Pendiente",
        open: entry,
        sl: slEl.value || null,
        tp: tpEl.value || null,
        margin,
        pnl: 0,
        time: new Date().toLocaleString()
      });

      save();
      tab = "open";
      render();
    }

    function closePosition(id) {
      const account = currentTradingAccount();
      const index = positions.findIndex((item) => item.id === id && positionBelongsToAccount(item, account));
      if (index < 0) return;

      const item = positions.splice(index, 1)[0];
      item.pnl = Number(floatingPnl(item).toFixed(2));
      closed.unshift({ ...item, time: new Date().toLocaleString() });
      applyClosedPnlToTradingAccount(item);
      save();
      tab = "closed";
      render();
    }

    function accountMarginLevel(account = currentTradingAccount()) {
      if (!account) return 0;
      const used = Number(account.usedMargin || 0);
      const equityValue = Number(account.equity || account.balance || 0);
      return used > 0 ? (equityValue / used) * 100 : 0;
    }

    function accountFloatingPnl(account = currentTradingAccount()) {
      if (!account) return 0;
      updateFloatingPnl();
      return positions
        .filter((item) => positionBelongsToAccount(item, account) && item.status !== "Pendiente")
        .reduce((sum, item) => sum + Number(item.pnl || 0), 0);
    }

    function tick() {
      tickCount++;

      ASSETS.forEach((item) => {
        const symbol = item[0];
        const current = prices[symbol];
        const volatility = current > 1000 ? 0.0007 : current > 100 ? 0.00035 : 0.00012;
        const next = Math.max(0.00001, current + (Math.random() - 0.5) * current * volatility);
        prices[symbol] = next;

        TIMEFRAMES.forEach((timeframe) => {
          const arr = candles[chartKey(symbol, timeframe)];
          if (!arr || !arr.length) return;

          const last = arr[arr.length - 1];
          last.close = next;
          last.high = Math.max(last.high, next);
          last.low = Math.min(last.low, next);

          if (tickCount % TICK_SPEED[timeframe] === 0) {
            arr.push({ open: last.close, high: next, low: next, close: next });
            if (arr.length > 90) arr.shift();
          }
        });
      });

      updateFloatingPnl();
      if (positions.length && Date.now() - lastFloatingSaveAt > 5000) {
        lastFloatingSaveAt = Date.now();
        save();
      }

      if (page !== "login") {
        const priceNode = document.querySelector(".price");
        if (priceNode) priceNode.textContent = fmt(price());
        if (tab === "open") renderTabs();
        drawChart();
      }
    }

    function drawChart() {
      const svg = $("chartSvg");
      if (!svg) return;

      const data = candles[chartKey(asset, tf)];
      if (!data || !data.length) return;

      const W = 1000;
      const H = 390;
      const L = 58;
      const R = 84;
      const T = 16;
      const B = 34;
      const CW = W - L - R;
      const CH = H - T - B;

      const min = Math.min(...data.map((item) => item.low));
      const max = Math.max(...data.map((item) => item.high));
      const range = max - min || 1;
      const y = (value) => T + CH - ((value - min) / range) * CH;
      const step = CW / data.length;

      let html = '<rect x="0" y="0" width="1000" height="390" fill="#060d1a"/>';

      for (let i = 0; i <= 6; i++) {
        const yy = T + (i * CH) / 6;
        const label = max - (i * range) / 6;
        html += `<line x1="${L}" y1="${yy}" x2="${W - R}" y2="${yy}" stroke="#111d30"/>`;
        html += `<text x="${L - 6}" y="${yy + 4}" fill="#5a6e8a" font-size="11" text-anchor="end">${fmt(label)}</text>`;
      }

      data.forEach((item, index) => {
        const x = L + index * step + step / 2;
        const bullish = item.close >= item.open;
        const color = bullish ? "#00d4a0" : "#f05e5e";
        const top = y(Math.max(item.open, item.close));
        const bottom = y(Math.min(item.open, item.close));
        const height = Math.max(bottom - top, 2);
        const width = Math.max(step * 0.55, 3);

        html += `<line x1="${x}" y1="${y(item.high)}" x2="${x}" y2="${y(item.low)}" stroke="${color}"/>`;

        if (bullish) {
          html += `<rect x="${x - width / 2}" y="${top}" width="${width}" height="${height}" fill="none" stroke="${color}"/>`;
        } else {
          html += `<rect x="${x - width / 2}" y="${top}" width="${width}" height="${height}" fill="${color}"/>`;
        }
      });

      const currentY = y(price());
      html += `<line x1="${L}" y1="${currentY}" x2="${W - R}" y2="${currentY}" stroke="#63b3ed" stroke-dasharray="5 5"/>`;
      html += `<rect x="${W - R + 4}" y="${currentY - 11}" width="76" height="22" fill="#63b3ed"/>`;
      html += `<text x="${W - R + 42}" y="${currentY + 4}" fill="#060d1a" font-size="11" font-weight="bold" text-anchor="middle">${fmt(price())}</text>`;

      svg.innerHTML = html;
    }

    initMarket();
    load();
    restoreSession();
    render();
    loadCloudState().then(() => {
      restoreSession();
      render();
    });
    setInterval(tick, 1000);
    setInterval(() => {
      if (cloudDirty || positions.length) queueCloudSave(100);
    }, 15000);
    document.addEventListener("visibilitychange", () => {
      if (document.visibilityState === "hidden") saveBeforeExit();
    });
    window.addEventListener("beforeunload", saveBeforeExit);
  </script>
</body>
</html>
